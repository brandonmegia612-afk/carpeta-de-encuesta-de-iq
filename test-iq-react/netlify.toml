# Netlify Configuration

[build]
  # Build command
  command = "npm run build"
  # Directory to publish (output folder)
  publish = "dist"

[build.environment]
  # Node version
  NODE_VERSION = "18.17.0"

# Redirect all routes to index.html for React Router (if you add routing in the future)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control headers
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
